<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Nexus</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">The Nexus</p>
          <h1 id="hero-project-name">שם הפרויקט</h1>
          <p id="hero-goal" class="subcopy">המטרה תופיע כאן</p>
        </div>
        <div class="hero-actions">
          <select id="project-select"></select>
          <button id="sync-casino-button">סנכרן</button>
          <button id="analyze-button">נתח</button>
          <button id="run-cycle-button">רענן</button>
        </div>
      </header>

      <main class="main-grid">
        <section class="hero-card now">
          <span class="card-kicker">מה המצב עכשיו</span>
          <div id="now-content"></div>
        </section>

        <section class="hero-card action">
          <span class="card-kicker">מה צריך לעשות עכשיו</span>
          <div id="critical-content"></div>
        </section>

        <section class="simple-card status">
          <h2>מה חסר</h2>
          <div id="missing-content" class="simple-list"></div>
        </section>

        <section class="simple-card good">
          <h2>מה כבר קיים</h2>
          <div id="existing-content" class="simple-list"></div>
        </section>

        <section class="simple-card tasks">
          <h2>מה קורה כרגע</h2>
          <div id="live-content" class="simple-list"></div>
        </section>

        <section class="simple-card decision">
          <h2>מה אתה צריך לאשר</h2>
          <div id="decision-content" class="simple-list"></div>
        </section>

        <section class="simple-card sync">
          <h2>חיבור לקזינו</h2>
          <div class="sync-row">
            <input id="casino-base-url-input" type="text" placeholder="http://localhost:4101" />
          </div>
          <div id="external-content" class="simple-list"></div>
        </section>

        <section class="details-card">
          <details>
            <summary>פרטים מתקדמים</summary>
            <div class="details-grid">
              <div class="detail-block">
                <h3>סריקת קוד</h3>
                <div class="sync-row">
                  <input id="scan-path-input" type="text" placeholder="/נתיב/מלא/לפרויקט" />
                  <button id="scan-button">סרוק</button>
                </div>
                <div id="scanner-content" class="detail-content"></div>
              </div>

              <div class="detail-block">
                <h3>ניתוח AI</h3>
                <div id="analysis-content" class="detail-content"></div>
              </div>

              <div class="detail-block">
                <h3>זרימת ביצוע</h3>
                <div id="graph-content" class="detail-content"></div>
              </div>

              <div class="detail-block">
                <h3>סוכנים</h3>
                <div id="agents-content" class="detail-content"></div>
              </div>

              <div class="detail-block wide">
                <h3>אירועים אחרונים</h3>
                <div id="events-content" class="detail-content"></div>
              </div>
            </div>
          </details>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
